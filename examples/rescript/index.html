<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <link rel="stylesheet" href="/src/style.css" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Tauri + ReScript</title>
        <script type="module" src="/src/Main.res" defer></script>
        <style>
            .logo.vite:hover {
                filter: drop-shadow(0 0 2em #747bff);
            }

            .logo.rescript:hover {
                filter: drop-shadow(0 0 2em #e6484f);
            }
        </style>
    </head>

    <body>
        <div class="container">
            <h1>Welcome to Tauri with ReScript!</h1>

            <div class="row">
                <a href="https://vitejs.dev" target="_blank">
                    <img src="/src/assets/vite.svg" class="logo vite" alt="Vite logo" />
                </a>
                <a href="https://tauri.app" target="_blank">
                    <img src="/src/assets/tauri.svg" class="logo tauri" alt="Tauri logo" />
                </a>
                <a href="https://rescript-lang.org" target="_blank">
                    <img src="/src/assets/rescript.svg" class="logo rescript" alt="ReScript logo" />
                </a>
            </div>

            <p>Click on the Tauri logo to learn more about the framework</p>

            <div class="row">
                <div>
                    <input id="greet-input" placeholder="Enter a name..." />
                    <button id="greet-button" type="button">Greet</button>
                </div>
            </div>

            <p id="greet-msg"></p>

            <div class="row">
                <div>
                    <button id="send-event-button" type="button">Send Event</button>
                </div>
            </div>
        </div>
    </body>
</html>
